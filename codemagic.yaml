workflows:
  ios-simulator-build:
    name: iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Install CocoaPods Dependencies
        script: |
          pod install --repo-update
      - name: Build Simulator App
        script: |
          xcodebuild \
            -workspace ClipboardTranslatorIOS.xcworkspace \
            -scheme ClipboardTranslatorIOS \
            -sdk iphonesimulator \
            -configuration Debug \
            build \
            -derivedDataPath $FCI_BUILD_DIR/DerivedData
      - name: Compress Simulator Build
        script: |
          cd $FCI_BUILD_DIR/DerivedData/Build/Products/Debug-iphonesimulator
          zip -r $FCI_BUILD_DIR/ClipboardTranslatorIOS.zip ClipboardTranslatorIOS.app
    artifacts:
      - $FCI_BUILD_DIR/ClipboardTranslatorIOS.zip
